<style>
    /* BASE PERFORMANCE & RESET */
    :root {
        --primary: #0056b3;
        --secondary: #28a745;
        --dark: #333;
        --light: #f8f9fa;
        --grey: #6c757d;
        --white: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: var(--dark);
        background-color: var(--white);
        overflow-x: hidden;
    }

    /* LAYOUT CONTAINERS */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    section { padding: 60px 0; }

    /* HEADER & NAVIGATION */
    header {
        background: var(--white);
        border-bottom: 2px solid var(--light);
        padding: 15px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
    }
    .nav-flex { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--dark); }

    /* HERO SECTION */
    .hero {
        background: linear-gradient(rgba(0,86,179,0.05), rgba(0,86,179,0.02)), var(--white);
        text-align: center;
        padding: 80px 0;
    }
    .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; margin-bottom: 20px; color: var(--primary); }
    .hero p { font-size: 1.25rem; color: var(--grey); margin-bottom: 40px; }

    /* EMERGENCY CTA */
    .pulse-btn {
        display: inline-block;
        background-color: var(--secondary);
        color: white;
        padding: 25px 50px;
        font-size: 1.8rem;
        font-weight: 800;
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        animation: pulse 2s infinite;
        transition: transform 0.3s ease;
    }
    .pulse-btn:hover { transform: scale(1.05); }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(40, 167, 69, 0); }
        100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
    }
    .response-time { display: block; margin-top: 15px; font-weight: 600; color: var(--dark); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

    /* SERVICE CARDS */
    .section-title { text-align: center; margin-bottom: 50px; font-size: 2.2rem; }
    .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 30px;
    }
    .service-card {
        background: var(--white);
        padding: 40px;
        border-radius: 12px;
        border: 1px solid #eee;
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    .service-card:hover { border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .service-card svg { width: 40px; height: 40px; margin-bottom: 20px; fill: var(--primary); }
    .service-card h3 { margin-bottom: 15px; font-size: 1.4rem; }
    .service-card p { color: var(--grey); font-size: 0.95rem; }

    /* HOW IT WORKS */
    .steps { display: flex; justify-content: space-between; gap: 40px; margin-top: 30px; }
    .step { flex: 1; text-align: center; position: relative; }
    .step-num { 
        width: 50px; height: 50px; background: var(--primary); color: white; 
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        margin: 0 auto 20px; font-weight: bold; font-size: 1.2rem;
    }

    /* TRUST SECTION */
    .trust-box { background: var(--light); border-radius: 20px; padding: 40px; }
    .trust-list { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
    .trust-item { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.1rem; }
    .trust-item svg { width: 24px; height: 24px; fill: var(--secondary); }

    /* SERVICE AREAS */
    .area-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-top: 30px;
    }
    .area-grid div { padding: 8px; border-left: 2px solid var(--primary); padding-left: 15px; font-size: 0.9rem; }

    /* FOOTER & MODALS */
    footer { background: var(--dark); color: white; padding: 40px 0; text-align: center; }
    .footer-links { margin: 20px 0; }
    .footer-links a { color: #aaa; text-decoration: none; margin: 0 15px; font-size: 0.85rem; cursor: pointer; }
    .footer-links a:hover { color: white; }

    .modal {
        display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
        width: 100%; height: 100%; background: rgba(0,0,0,0.8);
        padding: 20px;
    }
    .modal-content {
        background: white; color: #333; max-width: 800px; margin: 5% auto;
        padding: 40px; border-radius: 10px; max-height: 80vh; overflow-y: auto;
        position: relative; text-align: left;
    }
    .close { position: absolute; right: 20px; top: 20px; font-size: 2rem; cursor: pointer; }

    /* STICKY CALL BUTTON (MOBILE) */
    .sticky-call {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--secondary); color: white;
        text-align: center; padding: 15px; text-decoration: none;
        font-weight: 800; font-size: 1.2rem; z-index: 1500;
        display: none;
    }

    /* RESPONSIVE CSS */
    @media (max-width: 768px) {
        .nav-flex { justify-content: center; }
        .hero { padding: 40px 0; }
        .steps { flex-direction: column; }
        .area-grid { grid-template-columns: repeat(2, 1fr); }
        .sticky-call { display: block; }
        .services-grid { grid-template-columns: 1fr; }
        section { padding: 40px 0; }
        body { padding-bottom: 60px; } /* For sticky button */
    }
</style>
